<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Audit History</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Order Change History (Triggers)</h2>
        <a href="/" class="btn btn-outline-primary">Back to Dashboard</a>
    </div>

    <table class="table table-hover">
        <thead class="table-dark">
            <tr>
                <th>Log ID</th>
                <th>Order ID</th>
                <th>Action</th>
                <th>Old Status</th>
                <th>New Status</th>
                <th>Timestamp</th>
            </tr>
        </thead>
        <tbody>
            {% for log in logs %}
            <tr>
                <td>{{ log.log_id }}</td>
                <td>{{ log.order_id }}</td>
                <td><strong>{{ log.action }}</strong></td>
                <td class="text-muted">{{ log.old_status or 'N/A' }}</td>
                <td class="text-primary">{{ log.new_status }}</td>
                <td>{{ log.changed_at }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
